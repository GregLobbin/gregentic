<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREGENTIC // COP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080d13;--bg2:#0d1520;--bg3:#111d2a;
  --border:#1a2d42;--accent:#00c8f0;--accent2:#00e87a;
  --warn:#ff9a00;--danger:#ff3a3a;
  --text:#b8cedd;--dim:#4a6a8a;
  --font:'Courier New',monospace
}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden}

#hdr{background:var(--bg2);border-bottom:2px solid var(--accent);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
#logo{color:var(--accent);font-size:17px;font-weight:bold;letter-spacing:5px}
#logo span{color:var(--accent2)}
#clock{font-size:24px;color:var(--accent);letter-spacing:3px;min-width:180px;text-align:center}
#hdr-right{display:flex;align-items:center;gap:10px}
#date-line{font-size:10px;color:var(--dim);letter-spacing:1px;text-align:right}
.cfg-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--font);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.cfg-btn:hover{border-color:var(--accent);color:var(--accent)}

#grid{display:grid;grid-template-columns:270px 1fr 290px;gap:1px;background:var(--border);flex:1;overflow:hidden;min-height:0}
.panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.ph{background:var(--bg2);padding:5px 10px;font-size:9px;letter-spacing:2px;color:var(--dim);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 2s infinite}
.dot.red{background:var(--danger);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* MAP CONTROLS */
#map-controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.mc-group{display:flex;gap:3px;align-items:center}
.mc-label{font-size:8px;color:var(--dim);letter-spacing:1px;margin-right:4px;white-space:nowrap}
.mc-sep{width:1px;background:var(--border);height:16px;margin:0 4px}
.tb{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--font);font-size:9px;padding:3px 8px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
.tb:hover{border-color:var(--accent);color:var(--accent)}
.tb.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:bold}
.tb.ov-active{background:transparent;border-color:var(--accent2);color:var(--accent2)}

#map-wrap{flex:1;position:relative;min-height:0}
#map{position:absolute;inset:0}

/* WEATHER */
#wx-body{padding:14px;text-align:center;flex-shrink:0}
#wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.wxi{background:var(--bg2);border:1px solid var(--border);padding:7px;text-align:center}
.wxi .l{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.wxi .v{font-size:13px;color:var(--text);margin-top:2px}
#fc{padding:0 14px 14px;flex-shrink:0}
.fcd{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px}
.fcd:last-child{border:none}
.fct{color:var(--accent)}
.msg{color:var(--dim);font-size:10px;padding:14px;text-align:center}
.err{color:var(--danger);font-size:10px;padding:10px;text-align:center;line-height:1.6}

/* RIGHT */
#right{display:flex;flex-direction:column;min-height:0}
#adsb-list{flex:0 0 42%;overflow-y:auto;border-bottom:1px solid var(--border)}
#news-list{flex:1;overflow-y:auto;min-height:0}
.aci{padding:7px 10px;border-bottom:1px solid var(--border);font-size:10px}
.aci:hover{background:var(--bg2)}
.ac-cs{color:var(--accent2);font-size:11px;letter-spacing:2px}
.ac-d{color:var(--dim);margin-top:2px;font-size:9px}
.ni{padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer}
.ni:hover{background:var(--bg2)}
.nt{font-size:10px;color:var(--text);line-height:1.4;margin-bottom:3px}
.nm{font-size:8px;color:var(--dim);letter-spacing:1px}

#sb{background:var(--bg2);border-top:1px solid var(--border);padding:3px 14px;display:flex;gap:20px;font-size:8px;color:var(--dim);letter-spacing:1px;flex-shrink:0;align-items:center}
#sb span{color:var(--accent)}
#sb .brand{margin-left:auto;color:var(--border)}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center}
#modal.on{display:flex}
#mbox{background:var(--bg2);border:1px solid var(--accent);padding:22px;width:380px}
#mbox h2{color:var(--accent);font-size:11px;letter-spacing:3px;margin-bottom:14px}
.sr{margin-bottom:10px}
.sr label{display:block;font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:3px}
.sr input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:5px 7px}
.sr input:focus{outline:none;border-color:var(--accent)}
.mbtns{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;background:none;border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:9px;padding:7px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.btn.p{border-color:var(--accent);color:var(--accent)}
.btn:hover{background:var(--bg3)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">GREG<span>ENTIC</span> <span style="color:var(--border);font-size:12px">// COMMON OPERATING PICTURE</span></div>
  <div id="clock">--:--:-- Z</div>
  <div id="hdr-right">
    <div id="date-line"><div id="dl-date">---</div><div id="dl-loc">LEESBURG, VA</div></div>
    <button class="cfg-btn" onclick="openCfg()">⚙ CONFIG</button>
  </div>
</div>

<div id="grid">

  <div class="panel">
    <div class="ph"><span>METEOROLOGICAL</span><div class="dot" id="wx-dot"></div></div>
    <div id="wx-body"><div class="msg">ACQUIRING…</div></div>
    <div id="fc"></div>
  </div>

  <div class="panel">
    <div class="ph">
      <span>AIR PICTURE // ADS-B</span>
      <span id="ac-count" style="color:var(--accent2)">-- CONTACTS</span>
    </div>
    <!-- MAP CONTROLS -->
    <div id="map-controls">
      <span class="mc-label">BASE</span>
      <div class="mc-group">
        <button class="tb active" id="btn-dark"    onclick="setStyle('dark')">DARK</button>
        <button class="tb"        id="btn-sat"     onclick="setStyle('satellite')">SAT</button>
        <button class="tb"        id="btn-terrain" onclick="setStyle('terrain')">TERRAIN</button>
        <button class="tb"        id="btn-topo"    onclick="setStyle('topo')">TOPO</button>
        <button class="tb"        id="btn-street"  onclick="setStyle('street')">STREET</button>
      </div>
      <div class="mc-sep"></div>
      <span class="mc-label">OVERLAY</span>
      <div class="mc-group">
        <button class="tb" id="btn-radar"    onclick="toggleOverlay('radar')">◉ RADAR</button>
        <button class="tb" id="btn-aircraft" onclick="toggleOverlay('aircraft')" style="border-color:var(--accent2);color:var(--accent2)">◉ AIRCRAFT</button>
      </div>
      <div class="mc-sep"></div>
      <div class="mc-group">
        <button class="tb" onclick="refreshADSB()" style="color:var(--dim)">↻ REFRESH</button>
      </div>
    </div>
    <div id="map-wrap"><div id="map"></div></div>
  </div>

  <div class="panel" id="right">
    <div class="ph"><span>CONTACTS</span><div class="dot" id="ab-dot"></div></div>
    <div id="adsb-list"><div class="msg">ACQUIRING…</div></div>
    <div class="ph"><span>INTELLIGENCE FEED</span><div class="dot" id="nw-dot"></div></div>
    <div id="news-list"><div class="msg">ACQUIRING…</div></div>
  </div>

</div>

<div id="sb">
  <div>WX <span id="sb-wx">--</span></div>
  <div>ADS-B <span id="sb-ab">--</span></div>
  <div>FEED <span id="sb-nw">--</span></div>
  <div>RADIUS <span id="sb-r">50 NM</span></div>
  <div class="brand">GREGENTIC.COM // v0.2-MVP</div>
</div>

<div id="modal">
  <div id="mbox">
    <h2>⚙ CONFIGURATION</h2>
    <div class="sr"><label>LOCATION NAME</label><input id="c-loc" value="Leesburg, VA"></div>
    <div class="sr"><label>LATITUDE</label><input id="c-lat" type="number" value="39.1157" step="0.001"></div>
    <div class="sr"><label>LONGITUDE</label><input id="c-lon" type="number" value="-77.5636" step="0.001"></div>
    <div class="sr"><label>ADS-B RADIUS (NM)</label><input id="c-rad" type="number" value="50" min="10" max="150"></div>
    <div class="sr"><label>NEWS RSS FEED URL</label><input id="c-rss" value="https://feeds.bbci.co.uk/news/world/rss.xml"></div>
    <div class="mbtns">
      <button class="btn" onclick="closeCfg()">CANCEL</button>
      <button class="btn p" onclick="saveCfg()">APPLY</button>
    </div>
  </div>
</div>

<script>
let cfg = {
  loc:'Leesburg, VA', lat:39.1157, lon:-77.5636,
  radius:50, rss:'https://feeds.bbci.co.uk/news/world/rss.xml'
};

// ── TILE SOURCES ──────────────────────────────────────────
const STYLES = {
  dark:    { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', label:'DARK' },
  satellite:{ url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', label:'SAT', noSubdomain:true },
  terrain: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}', label:'TERRAIN', noSubdomain:true },
  topo:    { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', label:'TOPO', noSubdomain:true },
  street:  { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', label:'STREET' }
};

let map, baseLayer, acLayer, radarLayer, homeMarker, radiusCircle;
let overlays = { radar:false, aircraft:true };
let currentStyle = 'dark';

// ── CLOCK ─────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getUTCHours())}:${pad(n.getUTCMinutes())}:${pad(n.getUTCSeconds())} Z`;
  document.getElementById('dl-date').textContent =
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase();
}
setInterval(tick,1000); tick();

// ── MAP ───────────────────────────────────────────────────
function initMap() {
  if (map) map.remove();
  const s = STYLES[currentStyle];
  map = L.map('map',{center:[cfg.lat,cfg.lon],zoom:8,zoomControl:true,attributionControl:false});
  baseLayer = L.tileLayer(s.url, s.noSubdomain ? {maxZoom:19} : {maxZoom:19,subdomains:'abcd'}).addTo(map);
  homeMarker = L.circleMarker([cfg.lat,cfg.lon],{radius:7,color:'#00e87a',fillColor:'#00e87a',fillOpacity:.9})
    .bindTooltip(cfg.loc.toUpperCase()).addTo(map);
  radiusCircle = L.circle([cfg.lat,cfg.lon],{
    radius:cfg.radius*1852, color:'#00c8f0',
    fillColor:'#00c8f0', fillOpacity:.04, weight:1, dashArray:'4 6'
  }).addTo(map);
  acLayer = L.layerGroup().addTo(map);
  if (overlays.radar) initRadar();
}

function setStyle(name) {
  currentStyle = name;
  document.querySelectorAll('[id^=btn-]').forEach(b => {
    if (['btn-dark','btn-sat','btn-terrain','btn-topo','btn-street'].includes(b.id))
      b.classList.remove('active');
  });
  document.getElementById('btn-'+name.replace('satellite','sat')).classList.add('active');
  const s = STYLES[name];
  if (baseLayer) map.removeLayer(baseLayer);
  baseLayer = L.tileLayer(s.url, s.noSubdomain ? {maxZoom:19} : {maxZoom:19,subdomains:'abcd'}).addTo(map);
  baseLayer.bringToBack();
}

function toggleOverlay(name) {
  overlays[name] = !overlays[name];
  const btn = document.getElementById('btn-'+name);
  btn.classList.toggle('ov-active', overlays[name]);
  if (name === 'radar') {
    if (overlays.radar) initRadar(); else { if(radarLayer){map.removeLayer(radarLayer);radarLayer=null;} }
  }
  if (name === 'aircraft') {
    if (overlays.aircraft) acLayer.addTo(map); else map.removeLayer(acLayer);
  }
}

// ── WEATHER RADAR (RainViewer) ────────────────────────────
async function initRadar() {
  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const d = await r.json();
    const frames = d.radar.past;
    if (!frames.length) return;
    const latest = frames[frames.length-1];
    if (radarLayer) map.removeLayer(radarLayer);
    radarLayer = L.tileLayer(
      `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/4/1_1.png`,
      {opacity:0.55, zIndex:10, maxZoom:19}
    ).addTo(map);
  } catch(e) { console.warn('Radar unavailable:', e); }
}

// ── ADS-B ─────────────────────────────────────────────────
async function fetchADSB() {
  const deg = cfg.radius / 60;
  const url = `https://opensky-network.org/api/states/all?lamin=${cfg.lat-deg}&lomin=${cfg.lon-deg}&lamax=${cfg.lat+deg}&lomax=${cfg.lon+deg}`;
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(10000)});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const ac = (d.states||[])
      .filter(s=>s[5]&&s[6]&&!s[8])
      .map(s=>({
        icao:s[0], cs:(s[1]||'').trim()||s[0],
        lat:s[6], lon:s[5],
        alt:s[7]?Math.round(s[7]*3.281):null,
        spd:s[9]?Math.round(s[9]*1.944):null,
        hdg:s[10]||0, ctry:s[2]
      }))
      .sort((a,b)=>(b.alt||0)-(a.alt||0));

    acLayer.clearLayers();
    if (overlays.aircraft) {
      ac.forEach(a=>{
        const ic = L.divIcon({
          html:`<div style="color:#00e87a;font-size:12px;transform:rotate(${a.hdg}deg);line-height:1;text-shadow:0 0 4px #00e87a">▲</div>`,
          iconSize:[12,12], className:''
        });
        L.marker([a.lat,a.lon],{icon:ic})
         .bindTooltip(`<b style="color:#00e87a">${a.cs}</b><br>${a.alt?a.alt.toLocaleString()+' ft':'ALT N/A'}<br>${a.spd?a.spd+' kts':''}`,
           {className:'',direction:'top'})
         .addTo(acLayer);
      });
    }
    document.getElementById('ac-count').textContent = `${ac.length} CONTACTS`;
    document.getElementById('adsb-list').innerHTML = ac.length
      ? ac.slice(0,40).map(a=>`
          <div class="aci">
            <div class="ac-cs">${a.cs}</div>
            <div class="ac-d">${a.alt?a.alt.toLocaleString()+' FT':'—'} | ${a.spd?a.spd+' KTS':'—'} | ${a.ctry}</div>
          </div>`).join('')
      : '<div class="msg">NO AIRBORNE CONTACTS IN RANGE</div>';
    setDot('ab-dot',true);
    document.getElementById('sb-ab').textContent = fmtTime();
  } catch(e) {
    document.getElementById('adsb-list').innerHTML =
      `<div class="err">ADS-B UNAVAILABLE<br><small style="color:var(--dim)">${e.message}<br>OpenSky may be rate-limiting.<br>↻ REFRESH to retry.</small></div>`;
    document.getElementById('ac-count').textContent = '-- CONTACTS';
    setDot('ab-dot',false);
  }
}
function refreshADSB(){ document.getElementById('adsb-list').innerHTML='<div class="msg">ACQUIRING…</div>'; fetchADSB(); }

// ── WEATHER ───────────────────────────────────────────────
async function fetchWX() {
  try {
    const r = await fetch(`https://wttr.in/${encodeURIComponent(cfg.loc)}?format=j1`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const c = d.current_condition[0];
    document.getElementById('wx-body').innerHTML = `
      <div style="font-size:50px;color:var(--accent);line-height:1">${c.temp_F}°F</div>
      <div style="font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin:4px 0 10px">${c.weatherDesc[0].value}</div>
      <div id="wx-grid">
        ${wxi('HUMIDITY',c.humidity+'%')}
        ${wxi('FEELS LIKE',c.FeelsLikeF+'°F')}
        ${wxi('WIND',c.windspeedMiles+' MPH '+c.winddir16Point)}
        ${wxi('VISIBILITY',c.visibility+' MI')}
        ${wxi('PRESSURE',c.pressure+' MB')}
        ${wxi('CLOUD COVER',c.cloudcover+'%')}
      </div>`;
    document.getElementById('fc').innerHTML =
      d.weather.slice(0,3).map(w=>{
        const dn=new Date(w.date).toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
        return `<div class="fcd"><span>${dn}</span><span style="color:var(--dim);font-size:9px">${w.hourly[4]?.weatherDesc[0]?.value||''}</span><span class="fct">${w.mintempF}° / ${w.maxtempF}°F</span></div>`;
      }).join('');
    setDot('wx-dot',true);
    document.getElementById('sb-wx').textContent = fmtTime();
  } catch(e) {
    document.getElementById('wx-body').innerHTML=`<div class="err">WX UNAVAILABLE<br><small>${e.message}</small></div>`;
    setDot('wx-dot',false);
  }
}
function wxi(l,v){return`<div class="wxi"><div class="l">${l}</div><div class="v">${v}</div></div>`}

// ── NEWS (allorigins CORS proxy) ──────────────────────────
async function fetchNews() {
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(cfg.rss)}`;
    const r = await fetch(proxy);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(d.contents,'text/xml');
    const items = [...xml.querySelectorAll('item')].slice(0,25);
    if (!items.length) throw new Error('No items in feed');
    const feedTitle = xml.querySelector('channel > title')?.textContent || 'FEED';
    document.getElementById('news-list').innerHTML = items.map(i=>{
      const title = i.querySelector('title')?.textContent||'';
      const link  = i.querySelector('link')?.textContent || i.querySelector('guid')?.textContent||'#';
      const pub   = i.querySelector('pubDate')?.textContent;
      const time  = pub ? ago(new Date(pub)) : '';
      return `<div class="ni" onclick="window.open('${link}','_blank')">
        <div class="nt">${title}</div>
        <div class="nm">${time} // ${feedTitle.toUpperCase()}</div>
      </div>`;
    }).join('');
    setDot('nw-dot',true);
    document.getElementById('sb-nw').textContent = fmtTime();
  } catch(e) {
    document.getElementById('news-list').innerHTML=`<div class="err">FEED UNAVAILABLE<br><small>${e.message}</small></div>`;
    setDot('nw-dot',false);
  }
}

// ── UTILS ─────────────────────────────────────────────────
function ago(d){const m=Math.floor((Date.now()-d)/60000);if(m<1)return'JUST NOW';if(m<60)return`${m}M AGO`;if(m<1440)return`${Math.floor(m/60)}H AGO`;return`${Math.floor(m/1440)}D AGO`}
function fmtTime(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}
function setDot(id,ok){const d=document.getElementById(id);if(d){d.classList.toggle('red',!ok);d.style.animation=ok?'blink 2s infinite':'none'}}

// ── CONFIG ────────────────────────────────────────────────
function openCfg(){
  document.getElementById('c-loc').value=cfg.loc;
  document.getElementById('c-lat').value=cfg.lat;
  document.getElementById('c-lon').value=cfg.lon;
  document.getElementById('c-rad').value=cfg.radius;
  document.getElementById('c-rss').value=cfg.rss;
  document.getElementById('modal').classList.add('on');
}
function closeCfg(){document.getElementById('modal').classList.remove('on')}
function saveCfg(){
  cfg.loc=document.getElementById('c-loc').value;
  cfg.lat=parseFloat(document.getElementById('c-lat').value);
  cfg.lon=parseFloat(document.getElementById('c-lon').value);
  cfg.radius=parseInt(document.getElementById('c-rad').value);
  cfg.rss=document.getElementById('c-rss').value;
  document.getElementById('dl-loc').textContent=cfg.loc.toUpperCase();
  document.getElementById('sb-r').textContent=cfg.radius+' NM';
  closeCfg();
  initMap();
  fetchWX(); fetchADSB(); fetchNews();
}

// ── BOOT ──────────────────────────────────────────────────
document.getElementById('dl-loc').textContent=cfg.loc.toUpperCase();
document.getElementById('sb-r').textContent=cfg.radius+' NM';
document.getElementById('btn-aircraft').classList.add('ov-active');
initMap();
fetchWX(); fetchADSB(); fetchNews();
setInterval(fetchADSB,30000);
setInterval(fetchWX,600000);
setInterval(fetchNews,300000);
</script>
</body>
</html>
